<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Acme Corporation</title>
    <style>
        body {font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0;}
        .login-box {width:320px; margin:100px auto; background:#fff; padding:20px; border-radius:5px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
        h2 {text-align:center; color:#333;}
        input[type=text], input[type=password] {width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;}
        button {width:100%; padding:10px; background:#5cb85c; color:#fff; border:none; border-radius:4px; cursor:pointer;}
        button:hover {background:#4cae4c;}
        .links {text-align:center; margin-top:15px; font-size:0.9em;}
        .links a {color:#007bff; text-decoration:none;}
        .links a:hover {text-decoration:underline;}
    </style>
</head>
<body>
<div class="login-box>
    <h2>Employee Portal Login</h2>
    <form action="/login.do" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>
    <div class="links">
        <p>Don't have an account? <a href="/register.do">Register here</a></p>
        <p><a href="/forgot.do">Forgot password?</a></p>
    </div>
    <!-- Simulated error message that could be reflected via query param -->
    <p style="color:red; text-align:center; margin-top:10px;">Invalid username or password</p>
</div>
</body>
</html>
