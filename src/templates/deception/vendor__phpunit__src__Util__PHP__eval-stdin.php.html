<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PHPUnit Util - Eval stdin</title>
    <style>
        body {font-family:Arial,Helvetica,sans-serif; margin:40px; background:#f9f9f9; color:#333;}
        h1 {color:#2c3e50;}
        .container {background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); max-width:600px; margin:auto;}
        textarea {width:100%; height:150px; padding:10px; font-family:monospace; border:1px solid #ccc; border-radius:4px;}
        input[type=submit] {background:#2980b9; color:#fff; border:none; padding:10px 20px; border-radius:4px; cursor:pointer;}
        input[type=submit]:hover {background:#1f6391;}
        .note {font-size:0.9em; color:#555; margin-top:10px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Eval stdin Utility</h1>
        <p>This tool allows you to evaluate PHP code passed via standard input. Paste your code into the textarea below and click "Execute".</p>
        <form method="post" action="">
            <label for="code">PHP Code:</label><br>
            <textarea id="code" name="code"><?php echo "Hello, World!"; ?></textarea><br><br>
            <input type="submit" value="Execute">
        </form>
        <div class="note">
            <strong>Note:</strong> For security reasons, execution is limited to a sandboxed environment. Output will be displayed below the form after submission.
        </div>
    </div>
</body>
</html>
