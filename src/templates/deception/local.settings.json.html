<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>local.settings.json</title>
    <style>
        body {font-family: monospace; background:#f8f8f8; color:#333; padding:20px;}
        pre {background:#eee; padding:10px; border:1px solid #ccc;}
    </style>
</head>
<body>
    <h1>local.settings.json</h1>
    <pre>
{
  "IsEncrypted": false,
  "Values": {
    "AzureWebJobsStorage": "UseDevelopmentStorage=true",
    "FUNCTIONS_WORKER_RUNTIME": "dotnet",
    "MyConnectionString": "Server=myServerAddress;Database=myDataBase;User Id=myUsername;Password=myPassword;"
  }
}
</pre>
</body>
</html>
