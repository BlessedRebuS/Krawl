<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>settings.ini</title>
    <style>
        body {font-family: monospace; background:#f8f8f8; margin:2em;}
        pre {background:#eee; padding:1em; border:1px solid #ccc;}
    </style>
</head>
<body>
    <h1>settings.ini</h1>
    <pre>
[database]
host = localhost
port = 3306
user = admin
password = secret123
name = myapp

[mail]
smtp_host = smtp.example.com
smtp_port = 587
smtp_user = noreply@example.com
smtp_pass = mailpass
from = noreply@example.com

[debug]
enabled = true
log_level = verbose
    </pre>
</body>
</html>
