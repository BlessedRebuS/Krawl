<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>smtp/.env</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 2rem; background:#f9f9f9; color:#333;}
        h1 {color:#2c3e50;}
        pre {background:#ecf0f1; padding:1rem; border:1px solid #bdc3c7; overflow:auto;}
    </style>
</head>
<body>
    <h1>smtp/.env</h1>
    <pre>
MAIL_HOST=smtp.example.com
MAIL_PORT=587
MAIL_USERNAME=user@example.com
MAIL_PASSWORD=SuperSecretPass!2025
MAIL_ENCRYPTION=tls
MAIL_FROM_ADDRESS=no-reply@example.com
MAIL_FROM_NAME="Example App"
    </pre>
    <p>This file contains SMTP configuration settings. Ensure proper permissions are set.</p>
</body>
</html>
