<!DOCTYPEhtml>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Router Configuration - Credentials</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 40px; background:#f5f5f5;}
        .container {background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        h1 {color:#333;}
        table {width:100%; border-collapse:collapse; margin-top:20px;}
        th, td {padding:10px; border:1px solid #ddd; text-align:left;}
        th {background:#eee;}
        tr:nth-child(even) {background:#f9f9f9;}
        a {color:#0066cc; text-decoration:none;}
        a:hover {text-decoration:underline;}
        .add-link {margin-top:15px; display:inline-block;}
    </style>
</head>
<body>
<div class="container">
    <h1>Router Credentials Management</h1>
    <p>Manage usernames and passwords for device access.</p>
    <table>
        <thead>
            <tr>
                <th>Username</th>
                <th>Password</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>admin</td>
                <td>Admin123!</td>
                <td>Administrator</td>
                <td><a href="/router/credentials/edit/1">Edit</a> | <a href="/router/credentials/delete/1" onclick="return confirm('Delete this credential?')">Delete</a></td>
            </tr>
            <tr>
                <td>user1</td>
                <td>Passw0rd!</td>
                <td>User</td>
                <td><a href="/router/credentials/edit/2">Edit</a> | <a href="/router/credentials/delete/2" onclick="return confirm('Delete this credential?')">Delete</a></td>
            </tr>
            <tr>
                <td>support</td>
                <td>Supp0rt2023!</td>
                <td>Support</td>
                <td><a href="/router/credentials/edit/3">Edit</a> | <a href="/router/credentials/delete/3" onclick="return confirm('Delete this credential?')">Delete</a></td>
            </tr>
        </tbody>
    </table>
    <p class="add-link"><a href="/router/credentials/add">Add New Credential</a></p>
</div>
</body>
</html>
