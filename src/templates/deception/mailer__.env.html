<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>.env Configuration - Mailer Service</title>
    <style>
        body {font-family: monospace; background:#f8f8f8; margin:2em;}
        pre {background:#eee; padding:1em; border:1px solid #ccc;}
    </style>
</head>
<body>
    <h1>.env File</h1>
    <pre>
MAIL_HOST=smtp.example.com
MAIL_PORT=587
MAIL_USERNAME=user@example.com
MAIL_PASSWORD=SuperSecretPass123!
MAIL_FROM_ADDRESS=no-reply@example.com
MAIL_FROM_NAME="Example App"
MAIL_ENCRYPTION=tls
MAIL_DRIVER=smtp
    </pre>
</body>
</html>
