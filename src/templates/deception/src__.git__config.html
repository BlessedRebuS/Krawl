<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>.git/config - src</title>
    <style>
        body { font-family: monospace; background: #f8f8f8; color: #222; padding: 20px; }
        h1 { color: #333; }
        pre { background: #fff; padding: 10px; border: 1px solid #ddd; overflow:auto; }
    </style>
</head>
<body>
    <h1>src/.git/config</h1>
    <pre>
[core]
    repositoryformatversion = 0
    filemode = true
    bare = false
    logallrefupdates = true
[remote "origin"]
    url = https://example.com/project.git
    fetch = +refs/heads/*:refs/remotes/origin/*
[branch "main"]
    remote = origin
    merge = refs/heads/main
    </pre>
</body>
</html>
