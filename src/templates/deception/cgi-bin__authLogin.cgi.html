<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authentication Login</title>
    <style>
        body {font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:20px;}
        .container {max-width:400px; margin:auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        h2 {text-align:center; color:#333;}
        .form-group {margin-bottom:15px;}
        label {display:block; margin-bottom:5px; font-weight:bold;}
        input[type="text"], input[type="password"] {width:100%; padding:8px; box-sizing:border-box; border:1px solid #ccc; border-radius:4px;}
        input[type="submit"] {background:#0066cc; color:#fff; border:none; padding:10px 15px; cursor:pointer; border-radius:4px; width:100%;}
        input[type="submit"]:hover {background:#004c99;}
        .msg {padding:10px; margin-bottom:15px; border-radius:4px;}
        .error {background:#ffdddd; color:#a00; border:1px solid #f5c6c6;}
        .info {background:#ddffdd; color:#060; border:1px solid #c6f5c6;}
    </style>
</head>
<body>
<div class="container">
    <h2>Member Login</h2>
    <!-- DEBUG: backend query -> SELECT * FROM users WHERE username='$user' AND password='$pass' -->
    <form method="post" action="/cgi-bin/authLogin.cgi">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required placeholder="Enter password">
        </div>
        <input type="submit" value="Login">
    </form>
    <div class="msg info">
        Note: Forgot password? Contact admin@example.com
    </div>
</div>
</body>
</html>
