<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Acme Corp</title>
    <style>
        body {font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0;}
        .container {max-width:400px; margin:50px auto; background:#fff; padding:20px; box-shadow:0 0 10px rgba(0,0,0,0.1); border-radius:5px;}
        h2 {text-align:center; color:#333;}
        .form-group {margin-bottom:15px;}
        label {display:block; margin-bottom:5px; font-weight:bold;}
        input[type="email"] {width:100%; padding:8px; box-sizing:border-box; border:1px solid #ccc; border-radius:4px;}
        button {width:100%; padding:10px; background:#0066cc; color:#fff; border:none; border-radius:4px; cursor:pointer;}
        button:hover {background:#004c99;}
        .links {text-align:center; margin-top:20px; font-size:0.9em;}
        .links a {color:#0066cc; text-decoration:none;}
        .links a:hover {text-decoration:underline;}
        .footer {margin-top:30px; text-align:center; font-size:0.8em; color:#777;}
    </style>
</head>
<body>
<div class="container">
    <h2>Forgot Your Password?</h2>
    <p>Enter the email address associated with your account and we'll send you a link to reset your password.</p>
    <form action="/reset-password" method="POST">
        <!-- CSRF token placeholder for demonstration -->
        <input type="hidden" name="csrf_token" value="fake_token_12345">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <button type="submit">Send Reset Link</button>
    </form>
    <div class="links">
        <p>Remember your password? <a href="/login">Log in</a></p>
        <p>Need help? <a href="/support">Contact Support</a></p>
    </div>
    <div class="footer">
        © 2025 Acme Corp. All rights reserved. | <a href="/privacy">Privacy Policy</a> | <a href="/terms">Terms of Service</a>
    </div>
</div>
</body>
</html>
