<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cisco AnyConnect Secure Mobility Client - Login</title>
<style>
body{font-family:Arial,sans-serif;background:#f0f2f5;margin:0;padding:0;display:flex;height:100vh;align-items:center;justify-content:center;}
.login-box{background:#fff;padding:30px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.1);width:320px;}
.login-box h2{margin-top:0;text-align:center;color:#333;}
.login-box label{display:block;margin-top:15px;font-weight:bold;}
.login-box input[type=text],
.login-box input[type=password]{width:100%;padding:8px;margin-top:5px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;}
.login-box button{margin-top:20px;width:100%;padding:10px;background:#0066cc;color:#fff;border:none;border-radius:4px;font-size:1em;cursor:pointer;}
.login-box button:hover{background:#004c99;}
.login-box p{margin-top:20px;font-size:0.9em;text-align:center;color:#777;}
</style>
</head>
<body>
<div class="login-box">
<h2>Login</h2>
<form action="/+CSCOE+/logon.html" method="post">
<label for="username">Username:</label>
<input type="text" id="username" name="username" required><br>
<label for="password">Password:</label>
<input type="password" id="password" name="password" required><br>
<button type="submit">Sign In</button>
</form>
<p>© 2024 Cisco Systems, Inc. All rights reserved.</p>
</div>
</body>
</html>
