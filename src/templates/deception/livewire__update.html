<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livewire Update - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 600px; margin-top: 50px; }
        .form-control:focus { box-shadow: none; border-color: #86b7fe; }
        .btn-primary { background-color: #0d6efd; border-color: #0d6efd; }
        .alert { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Livewire Component Update</h4>
            </div>
            <div class="card-body">
                <form id="updateForm" method="POST" action="/livewire/update">
                    <input type="hidden" name="_token" value="fake_laravel_token_xyz789abc123">
                    <div class="mb-3">
                        <label for="componentName" class="form-label">Component Name</label>
                        <input type="text" class="form-control" id="componentName" name="componentName" value="UserProfile" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="data" class="form-label">Component Data (JSON)</label>
                        <textarea class="form-control" id="data" name="data" rows="6">{&quot;id&quot;:123,&quot;name&quot;:&quot;John Doe&quot;,&quot;email&quot;:&quot;john@example.com&quot;,&quot;role&quot;:&quot;admin&quot;,&quot;preferences&quot;:{&quot;theme&quot;:&quot;dark&quot;,&quot;notifications&quot;:true}}</textarea>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="forceUpdate" name="forceUpdate">
                        <label class="form-check-label" for="forceUpdate">Force update (bypass validation)</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Update Component</button>
                </form>
            </div>
        </div>
        <div class="mt-4 text-center">
            <small class="text-muted">
                Livewire v2.10.2 &bullet; Laravel 9.45.1 &bullet; Server Time: 2024-06-15 14:32:18 UTC
            </small>
        </div>
    </div>
    <script>
        document.getElementById('updateForm').addEventListener('submit', function(e) {
            // Simulate client-side processing before actual submission
            const submitBtn = this.querySelector('button[type=\"submit\"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class=\"spinner-border spinner-border-sm\"></span> Updating...';
            // In a real attack scenario, this might be where malicious payloads get processed
            // Fake vulnerability: unsanitized data reflection in response (simulated)
        });
    </script>
</body>
</html>
