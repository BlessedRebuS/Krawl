<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>robots.txt - Example Site</title>
    <style>
        body {font-family: monospace; background:#f8f8f8; color:#222; margin:0; padding:20px;}
        h1 {color:#333;}
        pre {background:#eee; padding:10px; border:1px solid #ccc; overflow:auto;}
    </style>
</head>
<body>
    <h1>robots.txt</h1>
    <p>This is the robots.txt file for example.com.</p>
    <pre>
User-agent: *
Disallow: /admin/
Disallow: /private/
Allow: /public/
Sitemap: https://example.com/sitemap.xml
    </pre>
</body>
</html>
