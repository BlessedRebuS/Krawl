<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nuxt.js Environment Configuration</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 2rem; background:#f9f9f9; color:#333;}
        h1 {color:#2c3e50;}
        pre {background:#fff; padding:1rem; border:1px solid #ddd; overflow:auto;}
    </style>
</head>
<body>
    <h1>Nuxt.js Environment Variables</h1>
    <pre>
NUXT_PUBLIC_API_URL=https://api.example.com
NUXT_DB_HOST=db.example.com
NUXT_DB_USER=admin
NUXT_DB_PASSWORD=SuperSecret123!
NUXT_JWT_SECRET=your-very-secret-key-change-in-production
NUXT_MODE=development
NUXT_PUBLIC_ENABLE_FEATURE_X=true
    </pre>
</body>
</html>
