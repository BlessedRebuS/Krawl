<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>/blog/.git/config</title>
    <style>
        body { font-family: monospace; white-space: pre; padding: 1em; background:#f8f8f8; }
    </style>
</head>
<body>
[core]
    repositoryformatversion = 0
    filemode = true
    bare = false
    logallrefupdates = true
[remote "origin"]
    url = https://example.com/repo.git
    fetch = +refs/heads/*:refs/remotes/origin/*
[branch "main"]
    remote = origin
    merge = refs/heads/main
</body>
</html>
