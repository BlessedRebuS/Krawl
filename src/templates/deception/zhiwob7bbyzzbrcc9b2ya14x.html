<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal Admin Portal</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4;}
        header, footer {background:#003366; color:#fff; text-align:center; padding:1rem;}
        nav {background:#004080; color:#fff; padding:0.5rem;}
        nav a {color:#fff; margin:0 1rem; text-decoration:none;}
        section {max-width:800px; margin:2rem auto; background:#fff; padding:2rem; box-shadow:0 0 10px rgba(0,0,0,0.1);}
        form label {display:block; margin-top:1rem;}
        input[type="text"], input[type="password"] {width:100%; padding:0.5rem; margin-top:0.2rem;}
        input[type="submit"] {margin-top:1rem; padding:0.5rem 1rem; background:#0066cc; color:#fff; border:none; cursor:pointer;}
        input[type="submit"]:hover {background:#004c99;}
    </style>
</head>
<body>
    <header>
        <h1>Internal Admin Portal</h1>
    </header>
    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/users">Users</a>
        <a href="/logs">Logs</a>
        <a href="/settings">Settings</a>
    </nav>
    <section>
        <h2>Welcome, Administrator</h2>
        <p>Use the form below to log in to the administrative interface.</p>
        <form action="/login" method="post">
            <label for="user">Username:</label>
            <input type="text" id="user" name="user" required>
            <label for="pass">Password:</label>
            <input type="password" id="pass" name="pass" required>
            <input type="submit" value="Log In">
        </form>
        <p>If you have forgotten your credentials, contact the IT department at <a href="mailto:it-support@example.com">it-support@example.com</a>.</p>
    </section>
    <footer>
        © 2025 Example Corp. All rights reserved.
    </footer>
</body>
</html>
