<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In – ExampleCorp Intranet</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f6f9; color:#333;}
        .container {max-width:400px; margin:50px auto; background:#fff; padding:30px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1);}
        h2 {text-align:center; color:#2c3e50;}
        .form-group {margin-bottom:15px;}
        label {display:block; margin-bottom:5px; font-weight:bold;}
        input[type="text"], input[type="password"] {width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;}
        button {width:100%; padding:12px; background:#2980b9; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:1em;}
        button:hover {background:#1f618d;}
        .links {margin-top:20px; text-align:center; font-size:.9em;}
        .links a {color:#2980b9; text-decoration:none;}
        .links a:hover {text-decoration:underline;}
        .footer {margin-top:30px; font-size:.8em; color:#777; text-align:center;}
        .alert {background:#ffe6e6; color:#c00; padding:10px; border-radius:4px; margin-bottom:15px; display:none;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Employee Sign In</h2>
        <form id="loginForm" action="/auth/signin" method="POST">
            <!-- Vulnerable to SQLi: username parameter directly concatenated -->
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
        <div id="errorMsg" class="alert"></div>
        <div class="links">
            <p>Forgot password? <a href="/auth/reset">Reset it here</a></p>
            <p>Don't have an account? <a href="/auth/register">Register</a></p>
        </div>
        <div class="footer">
            ExampleCorp Intranet &copy; 2025 &nbsp;|&nbsp; <a href="/">Home</a> &nbsp;|&nbsp; <a href="/about">About</a> &nbsp;|&nbsp; <a href="/contact">Contact</a>
        </div>
    </div>
    <script>
        // Simulate client-side validation that reflects XSS vulnerability
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'none';
            if (username === '' || password === '') {
                errorDiv.textContent = 'Please fill in all fields.';
                errorDiv.style.display = 'block';
                e.preventDefault();
                return;
            }
            // Fake reflected XSS: echo username in an alert without sanitization
            if (username.includes('<script>')) {
                errorDiv.textContent = 'Invalid characters detected.';
                errorDiv.style.display = 'block';
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
