<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Postgres .env</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 2em; background:#f9f9f9;}
        h1 {color:#2c3e50;}
        pre {background:#ecf0f1; padding:1em; border:1px solid #bdc3c7; overflow:auto;}
        p {color:#555;}
    </style>
</head>
<body>
    <h1>Postgres Environment Variables</h1>
    <pre>
# PostgreSQL connection settings
POSTGRES_USER=admin
POSTGRES_PASSWORD=SuperSecret123!
POSTGRES_DB=production
POSTGRES_HOST=localhost
POSTGRES_PORT=5432
POSTGRES_SSL_MODE=require
    </pre>
    <p>If you need to change these values, edit the .env file and restart the service.</p>
</body>
</html>
