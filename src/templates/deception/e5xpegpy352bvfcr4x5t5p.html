<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Internal Dashboard - Secure Access</title>
<style>
body{font-family:Arial,sans-serif;margin:40px;background:#f4f4f4;color:#333}
.container{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
h1{color:#2c3e50}
.form-group{margin-bottom:15px}
label{display:block;margin-bottom:5px;font-weight:bold}
input[type=text],input[type=password]{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px}
.btn{background:#3498db;color:#fff;border:none;padding:10px 15px;border-radius:4px;cursor:pointer}
.btn:hover{background:#2980b9}
.footer{margin-top:30px;font-size:0.9em;color:#7f8c8d}
</style>
</head>
<body>
<div class="container">
<h1>Internal Operations Dashboard</h1>
<p>Welcome to the restricted area. Please authenticate to continue.</p>
<form action="/login" method="POST">
<div class="form-group">
<label for="username">Username:</label>
<input type="text" id="username" name="username" placeholder="Enter username" required>
</div>
<div class="form-group">
<label for="password">Password:</label>
<input type="password" id="password" name="password" placeholder="Enter password" required>
</div>
<button type="submit" class="btn">Login</button>
</form>
<p class="footer">If you believe you have reached this page in error, please contact the system administrator.</p>
</div>
</body>
</html>
