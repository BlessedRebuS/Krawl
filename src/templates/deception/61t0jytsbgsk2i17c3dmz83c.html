<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal Admin Panel</title>
    <style>
        body {font-family: Arial, sans-serif; margin:40px; background:#f9f9f9;}
        h1 {color:#2c3e50;}
        .box {background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); max-width:500px;}
        input[type=text], input[type=password] {width:100%; padding:8px; margin:8px 0; border:1px solid #ccc; border-radius:4px;}
        button {background:#3498db; color:#fff; padding:10px 15px; border:none; border-radius:4px; cursor:pointer;}
        button:hover {background:#2980b9;}
        .note {font-size:0.9em; color:#7f8c8d; margin-top:15px;}
    </style>
</head>
<body>
    <div class="box">
        <h1>Internal Admin Panel</h1>
        <p>Welcome, authorized personnel. Use the form below to access restricted resources.</p>
        <form action="/process" method="post">
            <label for="user">Username:</label><br>
            <input type="text" id="user" name="username" required><br>
            <label for="pass">Password:</label><br>
            <input type="password" id="pass" name="password" required><br>
            <button type="submit">Login</button>
        </form>
        <p class="note">For debugging purposes, the backend logs queries directly. Avoid special characters.</p>
        <!-- Example of a potential injection point: SELECT * FROM users WHERE username = '$username' AND password = '$password' -->
        <hr>
        <p>Last updated: 2025-11-02 14:32 UTC</p>
        <p>Contact: <a href="mailto:admin@example.com">admin@example.com</a></p>
    </div>
</body>
</html>
