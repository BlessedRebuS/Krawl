<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal Dashboard</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 40px; background:#f9f9f9;}
        h1 {color:#2c3e50;}
        form {background:#fff; padding:20px; border-radius:5px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
        label {display:block; margin-top:10px;}
        input[type="text"], input[type="password"] {width:100%; padding:8px; margin-top:4px; box-sizing:border-box;}
        button {margin-top:15px; padding:10px 20px; background:#3498db; color:#fff; border:none; cursor:pointer;}
        button:hover {background:#2980b9;}
        table {width:100%; border-collapse:collapse; margin-top:20px;}
        th, td {border:1px solid #ddd; padding:8px; text-align:left;}
        th {background:#ecf0f1;}
    </style>
</head>
<body>
    <h1>Internal Dashboard</h1>
    <p>Welcome to the internal tools portal. Please authenticate to access services.</p>
    <form action="/login" method="post">
        <label for="user">Username:</label>
        <input type="text" id="user" name="user" required>
        <label for="pass">Password:</label>
        <input type="password" id="pass" name="pass" required>
        <button type="submit">Login</button>
    </form>
    <h2>Service Status</h2>
    <table>
        <thead>
            <tr>
                <th>Service</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Web Server</td>
                <td>Online</td>
            </tr>
            <tr>
                <td>Database</td>
                <td>Online</td>
            </tr>
            <tr>
                <td>Cache</td>
                <td>Online</td>
            </tr>
            <tr>
                <td>Mail Relay</td>
                <td>Degraded</td>
            </tr>
        </tbody>
    </table>
    <footer style="margin-top:30px; font-size:0.9em; color:#7f8c8d;">
        © 2025 Internal Corp. All rights reserved.
    </footer>
</body>
</html>
