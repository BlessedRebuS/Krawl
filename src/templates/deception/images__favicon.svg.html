<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Favicon SVG</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .note { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Favicon SVG</h1>
    <p>This is the SVG favicon for the site.</p>
    <!-- This comment is a placeholder for potential XSS testing -->
    <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" fill="#4285f4"/>
        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="24" font-family="Arial, sans-serif">G</text>
    </svg>
    <p class="note">If you see this, the server is responding with an HTML page instead of raw SVG.</p>
</body>
</html>
