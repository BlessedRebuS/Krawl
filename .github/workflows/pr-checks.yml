name: PR Checks

on:
  pull_request:
    branches:
      - main
      - beta
      - dev

permissions:
  contents: read
  issues: write

jobs:
  lint-and-test:
    name: Lint & Dependency Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pip-check-reqs ruff

      - name: Ruff lint check
        id: ruff
        continue-on-error: true
        run: |
          ruff check src/ | tee "$RUNNER_TEMP/ruff-report.txt"
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Comment Ruff findings on PR
        if: github.event_name == 'pull_request' && steps.ruff.outputs.exit_code != '0'
        uses: actions/github-script@v7
        env:
          RUFF_REPORT_PATH: ${{ runner.temp }}/ruff-report.txt
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ruff-lint-report -->';
            const reportPath = process.env.RUFF_REPORT_PATH;
            const report = fs.readFileSync(reportPath, 'utf8').trim();
            const body = `${marker}
            ### Ruff lint failures

            ```
            ${report.slice(0, 60000)}
            ```

            Run \\`ruff check --fix --unsafe-fixes src/\\` locally for the auto-fixable part, then rerun Ruff for the remaining issues.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail Ruff check
        if: steps.ruff.outputs.exit_code != '0'
        run: exit 1

      - name: Black format check
        run: black --check src/

      - name: Check for unused requirements
        run: |
          pip-missing-reqs src/
          pip-extra-reqs src/

  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t krawl:test .
