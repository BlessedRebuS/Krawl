[tool.ruff]
line-length = 88
target-version = "py312"
src = ["src"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "B", "I", "UP", "S"]

[tool.ruff.lint.per-file-ignores]
# These modules generate fake honeypot data; non-crypto randomness is intentional.
"src/generators.py" = ["S311"]
"src/routes/honeypot.py" = ["S311"]

[tool.ruff.format]
quote-style = "double"
